version: '3.8'

services:
  db:
    image: postgres:15
    container_name: avana-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # REQUIRED: Set POSTGRES_PASSWORD in Portainer environment variables
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-avana_rma}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - avana-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avana-backend
    restart: always
    depends_on:
      - db
    environment:
      # REQUIRED: Set these in Portainer environment variables before deploying
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-avana_rma}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      CORS_ORIGIN: '*'
      NODE_ENV: production
    networks:
      - avana-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avana-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - avana-net

volumes:
  pgdata:

networks:
  avana-net:
    driver: bridge
